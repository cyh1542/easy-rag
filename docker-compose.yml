services:
  api:
    build: .
    container_name: easy-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./models:/app/models
    command: easy-rag-api
    restart: unless-stopped

  web:
    build: .
    container_name: easy-rag-web
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./models:/app/models
    command: easy-rag-web
    environment:
      EASY_RAG_WEB_HOST: "0.0.0.0"
    restart: unless-stopped
